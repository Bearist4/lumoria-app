appId: bearista.Lumoria-App
name: A06 · Login rejects wrong password
tags:
  - auth
  - regression
---
- launchApp:
    clearState: true
    arguments:
      uitest: "YES"
- extendedWaitUntil:
    visible: "Tickets that last forever"
    timeout: 10000
- tapOn:
    text: "^Log in$"
- extendedWaitUntil:
    visible: "Welcome back!"
    timeout: 5000
- tapOn: "Your email address"
- inputText: ${TEST_EMAIL}
- hideKeyboard
- tapOn: "Your password"
- inputText: "definitely-wrong-password"
- hideKeyboard
- tapOn:
    text: "^Log in$"
# Expect to remain on sheet with an error. Copy may vary — assert the login
# sheet is still up rather than matching Supabase's exact error string.
- waitForAnimationToEnd
- assertVisible: "Welcome back!"
- assertNotVisible: "All tickets"
- takeScreenshot: login_error
