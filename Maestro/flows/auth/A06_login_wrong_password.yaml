appId: bearista.Lumoria-App
name: A06 · Login rejects wrong password
tags:
  - auth
  - regression
---
- launchApp:
    clearState: true
    arguments:
      uitest: "YES"
- extendedWaitUntil:
    visible: "Tickets that last forever"
    timeout: 10000
- tapOn: "Get started"
- extendedWaitUntil:
    visible: "Continue with Email"
    timeout: 5000
- tapOn: "Continue with Email"
- extendedWaitUntil:
    visible:
      id: "auth_email_field"
    timeout: 5000
- tapOn:
    id: "auth_email_field"
- inputText: ${TEST_EMAIL}
- tapOn:
    text: "^Continue$"
- extendedWaitUntil:
    visible:
      id: "auth_login_password"
    timeout: 10000
- tapOn:
    id: "auth_login_password"
- inputText: "definitely-wrong-password"
- tapOn:
    text: "^Log in$"
- waitForAnimationToEnd
- assertVisible: "Forgot password?"
- assertNotVisible: "All tickets"
- takeScreenshot: login_error
