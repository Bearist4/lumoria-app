appId: bearista.Lumoria-App
name: A01 · Signup happy path
tags:
  - auth
  - regression
env:
  TEST_NAME: "QA Bot"
  TEST_EMAIL_FRESH: "qa@getlumoria.app"
  TEST_SIGNUP_PASSWORD: "Test123!abc"
---
- launchApp:
    clearState: true
    arguments:
      uitest: "YES"
- extendedWaitUntil:
    visible: "Tickets that last forever"
    timeout: 10000
- tapOn: "Get started"
- extendedWaitUntil:
    visible: "Continue with Email"
    timeout: 5000
- tapOn: "Continue with Email"
# Email step
- extendedWaitUntil:
    visible:
      id: "auth_email_field"
    timeout: 5000
- tapOn:
    id: "auth_email_field"
- inputText: ${TEST_EMAIL_FRESH}
- tapOn:
    text: "^Continue$"
# Morph → signup
- extendedWaitUntil:
    visible: "Let's create your account"
    timeout: 10000
- tapOn:
    id: "auth_signup_name"
- inputText: ${TEST_NAME}
- tapOn:
    id: "auth_signup_password"
- inputText: ${TEST_SIGNUP_PASSWORD}
- assertVisible: "Strong"
# Confirm field is below the keyboard. The signup ScrollView has
# .scrollDismissesKeyboard(.immediately) — a swipe dismisses the
# keyboard so the rest of the form (confirm field + Create account
# button) becomes reachable.
- swipe:
    start: "50%,40%"
    end: "50%,15%"
    duration: 400
- tapOn:
    id: "auth_signup_confirm_password"
- inputText: ${TEST_SIGNUP_PASSWORD}
- swipe:
    start: "50%,40%"
    end: "50%,15%"
    duration: 400
- tapOn: "Create account"
- extendedWaitUntil:
    visible: "Check your email"
    timeout: 15000
- takeScreenshot: signup_confirmation
- tapOn: "OK"
