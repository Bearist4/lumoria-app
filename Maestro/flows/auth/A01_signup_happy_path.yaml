appId: bearista.Lumoria-App
name: A01 · Signup happy path
tags:
  - auth
  - regression
env:
  TEST_NAME: "QA Bot"
  TEST_SIGNUP_PASSWORD: "Test123!abc"
---
- launchApp:
    clearState: true
    arguments:
      uitest: "YES"
- extendedWaitUntil:
    visible: "Tickets that last forever"
    timeout: 10000
- tapOn: "Sign up"
- extendedWaitUntil:
    visible: "Let's get started"
    timeout: 5000
- tapOn: "Your name"
- inputText: ${TEST_NAME}
- hideKeyboard
- tapOn: "Your email address"
- inputText: ${TEST_EMAIL_FRESH}
- hideKeyboard
- tapOn: "Your password"
# Belt-and-suspenders: if the uitest launch arg didn't reach the app, iOS
# shows "Use Strong Password?" here. Dismiss to "Choose My Own Password".
- tapOn:
    text: "Choose My Own Password"
    optional: true
- inputText: ${TEST_SIGNUP_PASSWORD}
- hideKeyboard
- tapOn: "Confirm your password"
- tapOn:
    text: "Choose My Own Password"
    optional: true
- inputText: ${TEST_SIGNUP_PASSWORD}
- hideKeyboard
- assertVisible: "Weak"
- tapOn: "Create account"
- extendedWaitUntil:
    visible: "Check your email"
    timeout: 15000
- takeScreenshot: signup_confirmation
- tapOn: "OK"
