appId: bearista.Lumoria-App
name: A07 · Email-first morph routing (existing → login, new → signup)
tags:
  - auth
  - smoke
---
# Existing email morphs to Welcome back (login).
- launchApp:
    clearState: true
    arguments:
      uitest: "YES"
- extendedWaitUntil:
    visible: "Tickets that last forever"
    timeout: 10000
- tapOn: "Get started"
- extendedWaitUntil:
    visible: "Continue with email"
    timeout: 5000
- tapOn: "Continue with email"
- extendedWaitUntil:
    visible: "We'll check if you already have an account"
    timeout: 5000
- tapOn: "Your email address"
- inputText: ${TEST_EMAIL}
- hideKeyboard
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 10000
- takeScreenshot: morph_to_login

# Back chevron returns to email step with the email preserved.
- tapOn:
    id: "chevron.left"
- extendedWaitUntil:
    visible: "We'll check if you already have an account"
    timeout: 5000
- assertVisible: ${TEST_EMAIL}

# Brand new email morphs to Let's create your account (signup).
- tapOn: "Your email address"
- inputText: "newuser-${MAESTRO_RUN_ID}@maestro-test.invalid"
- hideKeyboard
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Let's create your account"
    timeout: 10000
- takeScreenshot: morph_to_signup
