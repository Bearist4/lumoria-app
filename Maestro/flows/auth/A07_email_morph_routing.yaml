appId: bearista.Lumoria-App
name: A07 · Email-first morph routing (existing → login, new → signup)
tags:
  - auth
  - smoke
---
- launchApp:
    clearState: true
    arguments:
      uitest: "YES"
- extendedWaitUntil:
    visible: "Tickets that last forever"
    timeout: 10000
- tapOn: "Get started"
- extendedWaitUntil:
    visible: "Continue with Email"
    timeout: 5000
- tapOn: "Continue with Email"
- extendedWaitUntil:
    visible:
      id: "auth_email_field"
    timeout: 5000
- tapOn:
    id: "auth_email_field"
- inputText: ${TEST_EMAIL}
- tapOn:
    text: "^Continue$"
- extendedWaitUntil:
    visible:
      id: "auth_login_password"
    timeout: 10000
- takeScreenshot: morph_to_login

# Back chevron returns to email step with the email preserved.
- tapOn:
    id: "chevron.left"
- extendedWaitUntil:
    visible:
      id: "auth_email_field"
    timeout: 5000
- assertVisible: ${TEST_EMAIL}
- assertNotVisible: "Forgot password?"

# Brand new email morphs to the Signup step.
- tapOn:
    id: "auth_email_field"
- eraseText: 64
- inputText: "newuser-${MAESTRO_RUN_ID}@maestro-test.invalid"
- tapOn:
    text: "^Continue$"
- extendedWaitUntil:
    visible: "Let's create your account"
    timeout: 10000
- takeScreenshot: morph_to_signup
