appId: ${APP_ID}
name: Subflow · Login
---
- launchApp:
    clearState: true
    arguments:
      uitest: "YES"
- extendedWaitUntil:
    visible: "Tickets that last forever"
    timeout: 10000
- tapOn: "Get started"
- extendedWaitUntil:
    visible: "Continue with email"
    timeout: 5000
- tapOn: "Continue with email"
- extendedWaitUntil:
    visible: "We'll check if you already have an account"
    timeout: 5000
- tapOn: "Your email address"
- inputText: ${TEST_EMAIL}
- hideKeyboard
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 10000
- tapOn: "Your password"
- inputText: ${TEST_PASSWORD}
- hideKeyboard
- tapOn:
    text: "^Log in$"
- extendedWaitUntil:
    visible: "All tickets"
    timeout: 20000
