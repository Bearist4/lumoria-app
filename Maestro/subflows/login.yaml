appId: ${APP_ID}
name: Subflow · Login
---
- launchApp:
    clearState: true
    arguments:
      uitest: "YES"
- extendedWaitUntil:
    visible: "Tickets that last forever"
    timeout: 10000
- tapOn: "Get started"
- extendedWaitUntil:
    visible: "Continue with Email"
    timeout: 5000
- tapOn: "Continue with Email"
- extendedWaitUntil:
    visible:
      id: "auth_email_field"
    timeout: 5000
- tapOn:
    id: "auth_email_field"
- inputText: ${TEST_EMAIL}
- tapOn:
    text: "^Continue$"
- extendedWaitUntil:
    visible:
      id: "auth_login_password"
    timeout: 10000
- tapOn:
    id: "auth_login_password"
- inputText: ${TEST_PASSWORD}
- tapOn:
    text: "^Log in$"
- extendedWaitUntil:
    visible: "All tickets"
    timeout: 20000
